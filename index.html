function checkFifoViolation(productId, qty, warehouse){
  qty=Number(qty);
  const allBatches=state.stock_batches.filter(b=>b.product_id===productId && b.remaining>0).sort(fifoSort);
  const whBatches=allBatches.filter(b=>b.warehouse===warehouse);
  const whTotal=whBatches.reduce((s,b)=>s+b.remaining,0);
  if(whTotal<qty){ return {violated:true,type:'insufficient',msg:`ن»“ه؛“ ${warehouse} ه؛“ه­کن¸چè¶³ï¼پéœ€è¦پ=${qty} è¯¥ن»“هڈ¯ç”¨=${whTotal}`}; }
  let rem=qty; const totalConsumed={};
  for(const b of allBatches){ if(rem<=0)break; const d=Math.min(b.remaining,rem); totalConsumed[b.id]=d; rem-=d; }
  rem=qty; const whConsumed={};
  for(const b of whBatches){ if(rem<=0)break; const d=Math.min(b.remaining,rem); whConsumed[b.id]=d; rem-=d; }
  const overConsumed={};
  for(const bid in whConsumed){ const tq=totalConsumed[bid]||0; if(whConsumed[bid]>tq) overConsumed[bid]=whConsumed[bid]-tq; }
  if(Object.keys(overConsumed).length===0) return {violated:false};
  const overBatches=allBatches.filter(b=>b.id in overConsumed);
  const otherOld=allBatches.filter(b=>{ const tq=totalConsumed[b.id]||0; const wq=whConsumed[b.id]||0; return tq>wq && b.warehouse!==warehouse; })
    .map(b=>({batch_id:b.id,warehouse:b.warehouse,production_date:b.production_date,remaining:b.remaining,should_consume:(totalConsumed[b.id]||0)-(whConsumed[b.id]||0)}));
  return {violated:true,type:'over',msg:{overBatches,overConsumed,otherOld,qty,warehouse}};
}

  let avail=batches.reduce((s,b)=>s+b.remaining,0);

}

function genOrderId(keyword, date){
  if(!date) date=todayStr();
  keyword = keyword || 'هںژé…چ';
  const prefix=keyword+date.replace(/-/g,'');
  const existing=state.outbound_records.filter(r=>r.order_id&&r.order_id.startsWith(prefix)).map(r=>r.order_id);

}

function renderRatioCard(name, la, yuan, isAll){
  const total=la+yuan;
  let statusClass='normal', statusText='و­£ه¸¸', detail='';
  if(la===0 && yuan===0){ statusText='و— ه؛“ه­ک'; statusClass='normal'; detail='è¾£é…±ن¸ژهژںé…±ه‌‡و— ه؛“ه­کم€‚'; }
  else if(la===0){ statusClass='no_la'; statusText='ç¼؛è¾£é…±'; detail='ن»…وœ‰هژںé…± '+fmt(yuan)+' ن»¶ï¼Œè¾£é…±ه·²è€—ه°½ï¼Œè¯·ه°½ه؟«è،¥è´§è¾£é…±م€‚'; }
  else{
    const laRatio=la/total, targetLa=1/(1+TARGET_RATIO);
    const diff=(laRatio-targetLa)/targetLa;
    const actualRatio=(yuan/la);
    if(Math.abs(diff)<=0.10){ statusClass='normal'; statusText='و­£ه¸¸'; }
    else if(diff>0){ statusClass='la_excess'; statusText='è¾£é…±هپڈه¤ڑ'; }
    else{ statusClass='yuan_excess'; statusText='هژںé…±هپڈه¤ڑ'; }
    const needLa=yuan/TARGET_RATIO;
    if(needLa>la){ detail='ه½“ه‰چ '+fmt(la)+' : '+fmt(yuan)+' = 1 : '+actualRatio.toFixed(2)+'ï¼Œهژںé…±هپڈه¤ڑï¼Œéœ€è،¥è¾£é…± <span class="pos">'+fmt(Math.ceil(needLa-la))+'</span> ن»¶è¾¾و ‡ه‡†م€‚'; }
    else if(needLa<la){ detail='ه½“ه‰چ '+fmt(la)+' : '+fmt(yuan)+' = 1 : '+actualRatio.toFixed(2)+'ï¼Œè¾£é…±هپڈه¤ڑï¼Œéœ€و¶ˆè€—/è°ƒه‡؛è¾£é…± <span class="neg">'+fmt(Math.ceil(la-needLa))+'</span> ن»¶è¾¾و ‡ه‡†م€‚'; }
    else{ detail='ه½“ه‰چ '+'1 : '+actualRatio.toFixed(2)+'ï¼Œو¯”ن¾‹و ‡ه‡†م€‚'; }
  }
  const laPct=total>0?Math.round(la/total*100):0, yuanPct=total>0?100-laPct:0;
  let h='<div class="ratio-card'+(isAll?' total':'')+'">';
  h+='<div class="ratio-card-head"><span class="wh-name">'+esc(name)+'</span><span class="ratio-status '+statusClass+'">'+statusText+'</span></div>';
  h+='<div class="ratio-numbers"><div class="ratio-number"><div class="num la">'+fmt(la)+'</div><div class="lbl">è¾£é…±</div></div><div class="ratio-number"><div class="num yuan">'+fmt(yuan)+'</div><div class="lbl">هژںé…±</div></div></div>';
  h+='<div class="ratio-bar"><div class="bar-la" style="width:'+laPct+'%">'+(laPct>=12?fmt(laPct)+'%':'')+'</div><div class="bar-yuan" style="width:'+yuanPct+'%">'+(yuanPct>=12?fmt(yuanPct)+'%':'')+'</div></div>';
  h+='<div class="ratio-ref"></div>';
  h+='<div class="ratio-detail">'+detail+'</div>';
  h+='</div>';
  return h;
}

function importData(evt){
  const file=evt.target.files[0];

      state=parsed;
      state.outbound_records=state.outbound_records||[];

}
